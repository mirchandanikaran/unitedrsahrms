version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hrms-db
    restart: unless-stopped
    env_file:
      - ./deployment/docker.env
    volumes:
      - hrms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    env_file:
      - ./deployment/docker.env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: unless-stopped
    env_file:
      - ./deployment/docker.env
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hrms-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  hrms_pg_data:
